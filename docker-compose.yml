version: '3.8'

services:
  strapi:
    build: ./backend
    container_name: decode-strapi
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "1337:1337"
    environment:
      - NODE_ENV=development

  nginx:
    image: nginx:alpine
    container_name: decode-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - strapi